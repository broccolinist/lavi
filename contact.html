<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Bug&Lavi Project</title>

    <!-- SEO / favicon -->
    <meta name="description" content="Bug&Lavi Projectへのお問い合わせはこちら。">
    <link rel="canonical" href="https://bug-and-lavi-project.com/contact.html">
    <link rel="icon" href="img/picture/lavi_icon.png">

    <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Bug&Lavi Project">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:title" content="Contact | Bug&Lavi Project">
    <meta property="og:description" content="Bug&Lavi Projectへのお問い合わせはこちら。">
    <meta property="og:url" content="https://bug-and-lavi-project.com/contact.html">
    <meta property="og:image" content="https://bug-and-lavi-project.com/img/picture/lavi_tati.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5204ed30baa54e48af164bfa0e777612"}'></script>
    <!-- End Cloudflare Web Analytics -->

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-image"></div>
    <header id="common-header"></header>

    <main>
        <h1 class="page-title">CONTACT</h1>

        <div class="content-box contact-box">
            <form action="https://ssgform.com/s/ksv3VlVP7hTt" method="POST" class="contact-form">
                <div class="form-group">
                    <label>件名</label>
                    <input type="text" name="件名" required>
                </div>
                <div class="form-group">
                    <label>名前</label>
                    <input type="text" name="お名前" required>
                </div>
                <div class="form-group">
                    <label>フリガナ</label>
                    <input type="text" name="フリガナ">
                </div>
                <div class="form-group">
                    <label>連絡先（メールアドレス）</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>内容</label>
                    <textarea name="お問い合わせ内容" rows="5" required></textarea>
                </div>

                <input type="hidden" name="redirect_to"
                    value="https://bug-and-lavi-project.com/index.html">

                <p class="form-consent" style="font-size:0.85em; margin:1em 0;">
                    <a href="privacy.html">プライバシーポリシー</a>に同意のうえ送信してください。
                </p>

                <button type="submit" class="btn submit-btn">送信する</button>
            </form>
        </div>
    </main>

    <footer id="common-footer"></footer>

    <script>
        async function loadCommonParts() {
            const headerRes = await fetch('header.html');
            const headerHtml = await headerRes.text();
            document.getElementById('common-header').innerHTML = headerHtml;
            const footerRes = await fetch('footer.html');
            const footerHtml = await footerRes.text();
            document.getElementById('common-footer').innerHTML = footerHtml;
            setupMenu();
        }

        function setupMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const navMenu = document.getElementById('navMenu');
            if (menuBtn && navMenu) {
                menuBtn.addEventListener('click', () => {
                    menuBtn.classList.toggle('open');
                    navMenu.classList.toggle('open');
                });
                navMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        menuBtn.classList.remove('open');
                        navMenu.classList.remove('open');
                    });
                });
            }
        }
        loadCommonParts();
    </script>
</body>

</html>
