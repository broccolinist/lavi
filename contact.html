<form action="https://ssgform.com/s/あなたのフォームID" method="POST" class="contact-form">
    <div class="form-group">
        <label>件名</label>
        <input type="text" name="件名" required>
    </div>
    <div class="form-group">
        <label>件名</label>
        <input type="text" name="subject" required>
    </div>
    <div class="form-group">
        <label>名前</label>
        <input type="text" name="name" required>
    </div>
