<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game | Bug&Lavi Project</title>

    <!-- SEO / favicon -->
    <meta name="description" content="ラヴィをテーマにしたブラウザゲーム。Bug&Lavi Projectのゲーム一覧。ブラウザですぐ遊べる。">
    <link rel="canonical" href="https://bug-and-lavi-project.com/game.html">
    <link rel="icon" href="img/picture/lavi_icon.png">

    <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Bug&Lavi Project">
    <meta property="og:locale" content="ja_JP">
    <meta property="og:title" content="Game | Bug&Lavi Project">
    <meta property="og:description" content="ラヴィをテーマにしたブラウザゲーム。Bug&Lavi Projectのゲーム一覧。">
    <meta property="og:url" content="https://bug-and-lavi-project.com/game.html">
    <meta property="og:image" content="https://bug-and-lavi-project.com/img/picture/lavi_tati.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5204ed30baa54e48af164bfa0e777612"}'></script>
    <!-- End Cloudflare Web Analytics -->

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-image"></div>

    <header id="common-header"></header>

    <main>
        <h1 class="page-title">GAME</h1>

        <div class="game-grid">
            <div class="game-card">
                <img src="img/picture/game1.png" alt="ラヴィの完全にoriginalなパズルゲーム" class="game-thumb">
                <div class="game-info">
                    <h3>ラヴィの完全にoriginalなパズルゲーム</h3>
                    <p>ラヴィの完全にoriginalなパズルゲームです。</br>
                        ブラウザで遊べるパズルゲーム。ハイスコアを目指そう！</p>
                    <div class="game-links">
                        <a href="https://broccolinist.github.io/laviori/" target="_blank" class="btn play-btn"><i
                                class="fas fa-play"></i> Play Now</a>
                    </div>
                </div>
            </div>

            <div class="game-card">
                <img src="img/picture/game2.png" alt="Slide Pazzle" class="game-thumb">
                <div class="game-info">
                    <h3>Slide Pazzle</h3>
                    <p>ブラウザで遊べるスライドパズルゲームです。</p>
                    <div class="game-links">
                        <a href="https://broccolinist.github.io/game.github.io-trial/" class="btn play-btn"><i
                                class="fas fa-play"></i> Play Now</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="common-footer"></footer>

    <script>
        async function loadCommonParts() {
            // ヘッダーの読み込み
            const headerRes = await fetch('header.html');
            const headerHtml = await headerRes.text();
            document.getElementById('common-header').innerHTML = headerHtml;

            // フッターの読み込み
            const footerRes = await fetch('footer.html');
            const footerHtml = await footerRes.text();
            document.getElementById('common-footer').innerHTML = footerHtml;

            // --- ヘッダー読み込み後にハンバーガーメニューのJSを起動させる ---
            setupMenu();
        }

        function setupMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const navMenu = document.getElementById('navMenu');

            if (menuBtn && navMenu) {
                menuBtn.addEventListener('click', () => {
                    menuBtn.classList.toggle('open');
                    navMenu.classList.toggle('open');
                });

                // リンクをクリックしたらメニューを閉じる処理を追加
                navMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        menuBtn.classList.remove('open');
                        navMenu.classList.remove('open');
                    });
                });
            }
        }

        // 実行
        loadCommonParts();
    </script>

</body>

</html>
