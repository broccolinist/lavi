<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music | Lavi AI singer-songwriter</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <div class="background-image"></div>

    <header id="common-header"></header>

    <main>
        <h1 class="page-title">MUSIC</h1>

        <div class="content-box">
            <div class="music-player">
                <iframe data-testid="embed-iframe" style="border-radius:12px"
                    src="https://open.spotify.com/embed/album/3CuxzuKY9LlDlviUo5TUEY?utm_source=generator" width="100%"
                    height="352" frameBorder="0" allowfullscreen=""
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"></iframe>
                <iframe data-testid="embed-iframe" style="border-radius:12px"
                    src="https://open.spotify.com/embed/album/6EETEg9wILPwewpQmmuVDT?utm_source=generator" width="100%"
                    height="352" frameBorder="0" allowfullscreen=""
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"></iframe>
            </div>
        </div>
        <script>
            // ハンバーガメニュー
            const menuBtn = document.getElementById('menuBtn');
            const navMenu = document.getElementById('navMenu');

            menuBtn.addEventListener('click', () => {
                menuBtn.classList.toggle('open');
                navMenu.classList.toggle('open');
            });

            // リンクをクリックしたら閉じる
            document.querySelectorAll('nav a').forEach(link => {
                link.addEventListener('click', () => {
                    menuBtn.classList.remove('open');
                    navMenu.classList.remove('open');
                });
            });
        </script>
    </main>

    <footer id="common-footer"></footer>

    <script>
        async function loadCommonParts() {
            // ヘッダーの読み込み
            const headerRes = await fetch('header.html');
            const headerHtml = await headerRes.text();
            document.getElementById('common-header').innerHTML = headerHtml;

            // フッターの読み込み
            const footerRes = await fetch('footer.html');
            const footerHtml = await footerRes.text();
            document.getElementById('common-footer').innerHTML = footerHtml;

            // --- ヘッダー読み込み後にハンバーガーメニューのJSを起動させる ---
            setupMenu();
        }

        function setupMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const navMenu = document.getElementById('navMenu');
            if (menuBtn && navMenu) {
                menuBtn.addEventListener('click', () => {
                    menuBtn.classList.toggle('open');
                    navMenu.classList.toggle('open');
                });
            }
        }

        // 実行
        loadCommonParts();
    </script>
    
</body>

</html>
