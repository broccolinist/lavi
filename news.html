<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Bug&Lavi Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-image"></div>
    <header id="common-header"></header>

    <main>
        <h1 class="page-title news_glitch">NEWS</h1>
        <div id="news-container" class="news-container">
        </div>
    </main>

    <footer id="common-footer"></footer>

    <script>
        // 1. 共通パーツを読み込む関数
        async function loadCommonParts() {
            try {
                const headerRes = await fetch('header.html');
                const headerHtml = await headerRes.text();
                document.getElementById('common-header').innerHTML = headerHtml;

                const footerRes = await fetch('footer.html');
                const footerHtml = await footerRes.text();
                document.getElementById('common-footer').innerHTML = footerHtml;

                setupMenu();
            } catch (error) {
                console.error("共通パーツの読み込みに失敗:", error);
            }
        }

        // 2. 記事ファイルを読み込む関数
        async function loadNewsArticles() {
            const articleFiles = [
                'news/20xxxxx1.html','news/20xxxxx2.html',
            ];

            const container = document.getElementById('news-container');
            // 一旦中身を空にする（二重読み込み防止）
            container.innerHTML = '';

            for (const file of articleFiles) {
                try {
                    const response = await fetch(file);
                    if (!response.ok) continue;

                    const htmlContent = await response.text();

                    // 外枠（ぼかし加工の箱）を作成
                    const articleBox = document.createElement('div');
                    articleBox.className = 'news-content-box';
                    articleBox.style.marginBottom = '30px'; // 記事同士の隙間
                    articleBox.style.textAlign = 'left';    // 文字を左寄せに固定

                    articleBox.innerHTML = htmlContent;
                    container.appendChild(articleBox);
                } catch (error) {
                    console.error("記事の読み込みに失敗:", file, error);
                }
            }
        }

        // 3. ハンバーガーメニューの設定
        function setupMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const navMenu = document.getElementById('navMenu');
            if (menuBtn && navMenu) {
                menuBtn.addEventListener('click', () => {
                    menuBtn.classList.toggle('open');
                    navMenu.classList.toggle('open');
                });
            }
        }

        // すべてを順番に実行
        async function init() {
            await loadCommonParts();
            await loadNewsArticles();
        }

        init();
    </script>
</body>

</html>
