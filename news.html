<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | Bug&Lavi Project</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="background-image"></div>

    <header id="common-header"></header>

    <main>
        <h1 class="page-title">NEWS</h1>

        <div class="news-container">
            <article class="news-item">
                <a href="news/20xxxxx1.html" class="news-link">
                    <img src="news1.jpg" alt="写真１" class="news-thumb">
                    <div class="news-text">
                        <span class="date">20xx.xx.xx</span>
                        <h3>○○を公開</h3>
                        <p>今回の新曲をご紹介します</p>
                    </div>
                </a>
            </article>

            <article class="news-item">
                <a href="news/20xxxxx2.html" class="news-link">
                    <img src="news2.jpg" alt="写真2" class="news-thumb">
                    <div class="news-text">
                        <span class="date">20xx.xx.xx</span>
                        <h3>作業用BGMにおすすめ</h3>
                        <p>おすすめの楽曲をまとめました</p>
                    </div>
                </a>
            </article>

            <article class="news-item">
                <div class="no-link-item">
                    <img src="news_common.jpg" alt="お知らせ" class="news-thumb">
                    <div class="news-text">
                        <span class="date">202x.xx.xx</span>
                        <h3>公式サイトをオープンしました</h3>
                    </div>
                </div>
            </article>

        </div>
    </main>

    <footer id="common-footer"></footer>

    <script>
        async function loadCommonParts() {
            // ヘッダーの読み込み
            const headerRes = await fetch('header.html');
            const headerHtml = await headerRes.text();
            document.getElementById('common-header').innerHTML = headerHtml;

            // フッターの読み込み
            const footerRes = await fetch('footer.html');
            const footerHtml = await footerRes.text();
            document.getElementById('common-footer').innerHTML = footerHtml;

            // --- ヘッダー読み込み後にハンバーガーメニューのJSを起動させる ---
            setupMenu();
        }

        function setupMenu() {
            const menuBtn = document.getElementById('menuBtn');
            const navMenu = document.getElementById('navMenu');

            if (menuBtn && navMenu) {
                menuBtn.addEventListener('click', () => {
                    menuBtn.classList.toggle('open');
                    navMenu.classList.toggle('open');
                });

                // リンクをクリックしたらメニューを閉じる処理を追加
                navMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        menuBtn.classList.remove('open');
                        navMenu.classList.remove('open');
                    });
                });
            }
        }

        // 実行
        loadCommonParts();
    </script>
</body>

</html>
